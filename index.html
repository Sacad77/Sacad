<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA252 Class Behavior Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; --success: #10b981; --danger: #ef4444; --background: #f4f6fa; --text-main: #0f172a; --text-muted: #64748b; --gradient: linear-gradient(135deg, #1e3a8a 0%, #4f46e5 100%); --card-shadow: 0 20px 40px -15px rgba(30, 58, 138, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--background); color: var(--text-main); padding-bottom: 40px; }
        header { background: var(--gradient); color: white; padding: 70px 20px; text-align: center; border-radius: 0 0 50px 50px; }
        .container { width: 92%; max-width: 1100px; margin: -40px auto 0 auto; padding: 35px; background: rgba(255, 255, 255, 0.98); border-radius: 30px; box-shadow: var(--card-shadow); }
        .tabs { display: flex; background: #e2e8f0; padding: 6px; border-radius: 20px; gap: 6px; margin-bottom: 35px; }
        .tab-btn { flex: 1; padding: 16px; border: none; background: transparent; cursor: pointer; font-weight: 700; color: #475569; border-radius: 14px; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary-dark); }
        .panel { display: none; } .panel.active { display: block; }
        input { width: 100%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 16px; margin-bottom: 20px; }
        .student-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-top: 25px; }
        .btn-login { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; }
        footer { text-align: center; margin-top: 60px; font-weight: 700; color: var(--text-muted); }
    </style>
</head>
<body>

<header><h1>CA252 Class Behavior Management System</h1></header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-student-tab" onclick="switchTab('student-panel')">Bogga Ardayga</button>
        <button class="tab-btn" id="btn-admin-tab" onclick="switchTab('admin-login-panel')">Bogga Guddiga</button>
    </div>

    <div id="student-panel" class="panel active">
        <h2>Ugu Kaalay Xaaladda Dhaqankaaga</h2>
        <input type="text" id="search-input" onkeyup="liveCheckStudentStatus()" placeholder="Geli ID ama Magacaaga...">
        <div id="student-result" style="display: none;"></div>
    </div>

    <div id="admin-login-panel" class="panel">
        <input type="text" id="login-admin-name" placeholder="Magacaaga...">
        <input type="password" id="login-admin-pass" placeholder="Password...">
        <button class="btn-login" onclick="processAdminLogin()">Login</button>
    </div>

    <div id="admin-panel" class="panel">
        <h2>Maamulka Guddiga</h2>
        <div id="admin-table-body"></div>
    </div>
</div>

<footer>Designed & developed by <span>Sacad Siciid Caraaye</span></footer>
